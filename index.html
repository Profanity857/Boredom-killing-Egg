<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>敲碎无聊</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <div class="header">
        <span class="title">🥚 不知道做什么 🥚</span>
        <span class="subtitle">敲碎一颗蛋，获得今日灵感</span>
    </div>

    <!-- 筛选面板 -->
    <div class="filter-panel">
        <div class="filter-header" id="filterHeader">
            <span>🔍 筛选条件</span>
            <span id="filterArrow">▼</span>
        </div>
        <div class="filter-body" id="filterBody">
            <div class="filter-group">
                <span class="filter-label">💰 预算</span>
                <div class="option-group" id="budgetGroup"></div>
            </div>
            <div class="filter-group">
                <span class="filter-label">⏱️ 时长</span>
                <div class="option-group" id="durationGroup"></div>
            </div>
            <div class="filter-group">
                <span class="filter-label">🌳 地点</span>
                <div class="option-group" id="placeGroup"></div>
            </div>
            <div class="filter-group">
                <span class="filter-label">👥 人数</span>
                <div class="option-group" id="peopleGroup"></div>
            </div>
            <div class="filter-actions">
                <button class="reset-btn" id="resetBtn">重置筛选</button>
            </div>
        </div>
    </div>

    <!-- 抽蛋区域 -->
    <div class="egg-machine">
        <div class="tap-hint-top">👇 点击蛋抽取</div>
        <div class="egg-wrapper" id="eggWrapper">
            <div class="egg" id="egg">
                <div class="egg-spot"></div>
                <div class="egg-spot"></div>
                <div class="egg-spot"></div>
            </div>
            <div class="crack-line" id="crackLine" style="display: none;">
                <div class="crack-piece"></div>
            </div>
        </div>
    </div>

    <!-- 访问计数器 -->
    <div class="visit-counter">🥚 已有 <span id="visitCount">0</span> 人敲过这颗蛋</div>
</div>

<!-- 纸条弹窗 -->
<div id="paperModal" class="modal-mask" style="display: none;">
    <div class="paper">
        <div class="paper-tape"></div>
        <div class="paper-content">
            <div class="paper-emoji">📜</div>
            <div class="paper-title">今日推荐</div>
            <div class="paper-task" id="paperTask"></div>
            <div class="paper-tags" id="paperTags"></div>
        </div>
        <div class="paper-close" id="closePaper">✕</div>
    </div>
</div>

<!-- 右侧反馈按钮 -->
<div class="feedback-fab" id="feedbackFab">
    <div class="fab-icon">💬</div>
    <div class="fab-text">反馈</div>
</div>

<!-- 左侧自定义库按钮 -->
<div class="custom-fab" id="customFab">
    <div class="custom-icon">✏️</div>
    <div class="custom-text">我的点子</div>
</div>

<!-- 反馈弹窗（Netlify Forms - 修复版） -->
<div id="feedbackModal" class="feedback-modal" style="display: none;">
    <div class="feedback-card">
        <div class="close-feedback" id="closeFeedbackModal">✕</div>
        <h3>📢 告诉蛋蛋你的想法</h3>
        <!-- 关键修改：添加 data-netlify="true" 和 action="thank-you" -->
        <form id="feedbackForm" name="feedback" data-netlify="true" method="POST" action="/thank-you" netlify-honeypot="bot-field">
            <!-- 隐藏的防机器人字段（Netlify 要求） -->
            <p class="hidden" style="display: none;">
                <label>Don’t fill this out if you're human: <input name="bot-field" /></label>
            </p>
            <!-- 必须的隐藏表单名 -->
            <input type="hidden" name="form-name" value="feedback" />
            <input type="hidden" id="feedbackType" name="type" value="" />
            
            <div id="feedbackOptions">
                <div class="feedback-option" data-type="idea">💡 我也有个很棒的点子来对抗无聊！</div>
                <div class="feedback-option" data-type="wrong">⚠️ 有个事件好像分类不太对呢……</div>
                <div class="feedback-option" data-type="other">🗣️ 我还有别的话要和蛋蛋说！</div>
            </div>
            <textarea id="feedbackText" name="message" class="feedback-textarea" placeholder="请写下你的建议或问题..." rows="3" style="display: none;"></textarea>
            <button type="submit" id="submitFeedbackBtn" class="feedback-submit-btn" style="display: none;">提交</button>
        </form>
    </div>
</div>

<!-- Netlify 隐藏表单副本（用于让 Netlify 扫描到） -->
<div style="position: absolute; left: -9999px; top: -9999px;">
    <form name="feedback" data-netlify="true" netlify-honeypot="bot-field" method="POST" action="/thank-you">
        <input type="hidden" name="form-name" value="feedback" />
        <input type="text" name="type" />
        <textarea name="message"></textarea>
        <input type="text" name="bot-field" />
    </form>
</div>


<!-- 自定义库弹窗 -->
<div id="customModal" class="custom-modal" style="display: none;">
    <div class="custom-card">
        <h3>📦 我的自定义点子</h3>
        <div id="customList"></div>
        <button id="showAddFormBtn" class="add-btn">➕ 添加新点子</button>
        <div id="addForm" style="display: none; margin-top: 16px;">
            <input type="text" id="newName" placeholder="活动名称" required>
            <select id="newBudget">
                <option value="free">免费</option>
                <option value="cheap">小资</option>
                <option value="medium">中等</option>
                <option value="expensive">稍贵</option>
            </select>
            <select id="newDuration">
                <option value="short">15分钟内</option>
                <option value="medium">半小时</option>
                <option value="long">1-2小时</option>
                <option value="whole">半天以上</option>
            </select>
            <select id="newPlace">
                <option value="indoor">室内</option>
                <option value="outdoor">户外</option>
            </select>
            <select id="newPeople">
                <option value="alone">独自</option>
                <option value="couple">结伴</option>
                <option value="group">多人</option>
            </select>
            <button id="saveCustomBtn" class="add-btn">保存</button>
        </div>
        <button id="closeCustomModal" class="add-btn" style="background: #e7cfb5; margin-top: 10px;">关闭</button>
    </div>
</div>

<script src="data.js"></script>
<script src="script.js"></script>
</body>
</html>
